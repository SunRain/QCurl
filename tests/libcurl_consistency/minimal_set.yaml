# QCurl ↔ libcurl 可观测一致性最小回归集合（基于 upstream curl/tests）
#
# 设计目标：
# - 以“外部可观测数据”为唯一对齐对象，不比较内部实现/性能/资源释放细节
# - 在 CI 中长期稳定运行：离线优先、避免 flaky、按能力自动降级（capability-gated）
# - 以最小集合覆盖最容易产生 API 行为差异的维度（方法/重定向/cookie/上传/超时/TLS/代理等）
#
# 用法（建议）：
# - 该文件是“选择结果/契约规范”的机器可读定义；具体 runner 可据此映射到：
#   - 上游 curl tests：`perl curl/tests/runtests.pl <testnum>` 或 `pytest curl/tests/http/...`
#   - 本仓库一致性 Gate：`python3 tests/libcurl_consistency/run_gate.py --suite p0|p1|all`
#
# 备注：
# - 对于 pytest 参数化用例，本集合仅选择其中“代表性参数”；若 runner 无法筛选单参数，
#   可临时退化为跑该用例的全部参数，但需要在 CI 报告中显式标注“退化原因”。

schema_version: 1

set:
  id: qcurl-libcurl-observable-minimal-v1
  title: QCurl ↔ libcurl 可观测一致性最小回归集合
  upstream_root: curl/tests
  last_updated: "2026-01-22"
  ci_properties:
    offline_first: true
    flaky_excluded: true
    capability_gated: true

observability_contract:
  scope:
    - 仅比较外部可观测数据（请求/响应/错误/状态/TLS/代理等）
    - 不比较内部实现细节（状态机/句柄复用实现/内存分配/线程调度）
    - 不比较性能指标（吞吐/延迟/CPU/内存），但比较“超时/取消”终态语义
  strict_match:
    request:
      - method
      - url_normalized
      - body_len
      - body_sha256
      - headers_selected
    response:
      - status
      - body_len
      - body_sha256
      - http_version_when_explicit
    error:
      - kind_normalized
      - curlcode_when_available
  allowed_differences:
    url:
      - host 大小写不敏感
      - percent-encoding 大小写不敏感（但语义需等价）
    headers:
      - 默认不比较头字段顺序
      - 默认不比较头字段大小写（键名按 lower 归一化）
      - 除 Set-Cookie 外，默认按“键值集合”比较（不保留重复头）
      - Set-Cookie 若纳入对比，需保留多条与出现顺序（否则应从断言中剔除）
      - 例外：raw 响应头（顺序/重复头）仅在专用用例中严格对齐（跳过 Date/Server），见 `tests/libcurl_consistency/test_p1_resp_headers.py`
    transfer:
      - 默认不强制 Content-Length vs Transfer-Encoding: chunked（除非用例明确要求）
    timing:
      - 不比较精确耗时数值；只比较超时/取消的终态与错误类别
  normalization:
    url:
      strip_query_keys: ["id"]
      drop_default_ports: true
    headers:
      key_case: lower
      trim_ows: true

cases:
  # ---------------------------------------------------------------------------
  # HTTP(S) 下载/上传（上游 http/testenv，本仓库已有对应 baseline 客户端）
  # ---------------------------------------------------------------------------
  - id: http_download_serial_resume
    source:
      type: pytest
      nodeid: "curl/tests/http/test_02_download.py::TestDownload::test_02_21_lib_serial"
    selection:
      parameters:
        pause_offset:
          required: [102300] # 100*1023，上游覆盖里最具代表性的非零 pause
          fallback_if_param_filter_unavailable: [0, 10240, 102300, 640000]
        proto:
          required: ["http/1.1", "h2"]
          optional: ["h3"]
    dimensions:
      - http_method:get
      - https
      - url_parsing
      - response_body_bytes
      - http_version:h1_h2_h3
      - pause_resume_disturbance
    observation_points:
      - 服务端观测 method/url/status/http_version 一致
      - 关键请求头白名单（Range/Content-Length）一致
      - 下载文件 body_len/body_sha256 一致
    minimality_reason:
      - 核心下载通路 + 协议族分歧（h1/h2/h3）是最高价值的差异捕获点
      - pause/resume 为数据通路引入扰动，能放大边界问题但相对稳定
    prerequisites:
      - "curl/tests/http/testenv 可运行（httpd + nghttpx；h3 需 QUIC nghttpx）"
      - "LocalClient(cli_hx_download) 已构建"
    stability_notes:
      - "h3 仅在 have_h3() 时执行；否则应在报告中标记 skip"

  - id: http_upload_put
    source:
      type: pytest
      nodeid: "curl/tests/http/test_07_upload.py::TestUpload::test_07_15_hx_put"
    selection:
      parameters:
        proto:
          required: ["http/1.1", "h2"]
          optional: ["h3"]
    dimensions:
      - http_method:put
      - request_body_bytes
      - content_length
      - response_body_bytes
      - http_version:h1_h2_h3
    observation_points:
      - 服务端观测 method/url/status/http_version 一致
      - Content-Length 一致（该用例要求）
      - 响应回显/长度语义一致（body_len/body_sha256）
    minimality_reason:
      - PUT 上传常走 CUSTOMREQUEST/POSTFIELDS 映射，最容易出现 body/长度差异
    prerequisites:
      - "curl/tests/http/testenv 可运行（https 端口可用）"
      - "LocalClient(cli_hx_upload) 已构建"
    stability_notes:
      - "h3 仅在 have_h3() 时执行；否则应在报告中标记 skip"

  - id: http_upload_post_reuse
    source:
      type: pytest
      nodeid: "curl/tests/http/test_07_upload.py::TestUpload::test_07_17_hx_post_reuse"
    selection:
      parameters:
        proto:
          required: ["http/1.1", "h2"]
          optional: ["h3"]
    dimensions:
      - http_method:post
      - request_body_bytes
      - connection_reuse_only_if_observable
      - http_version:h1_h2_h3
    observation_points:
      - 服务端观测 method/url/status/http_version 一致（多次请求集合等价）
      - 响应体字节一致（回显）
    minimality_reason:
      - 覆盖“多次请求 + 复用路径”在可观测层面的潜在差异（仅在导致差异时纳入）
    prerequisites:
      - "curl/tests/http/testenv 可运行（https 端口可用）"
      - "LocalClient(cli_hx_upload) 已构建"
    stability_notes:
      - "http/1.1 下基线可能走 chunked（无 Content-Length）；对比应以 body 字节为主"

  # ---------------------------------------------------------------------------
  # 请求体/Expect/重定向/Cookie（上游 data/testNNNN）
  # ---------------------------------------------------------------------------
  - id: curl_data_test1531_postfields_binary
    source:
      type: curl_data
      path: "curl/tests/data/test1531"
      test_number: 1531
    capability_gates:
      - http
    dimensions:
      - postfields_binary_with_nul
      - content_length
      - request_body_bytes
    observation_points:
      - 请求体 body_len/body_sha256 严格一致（包含 \\0）
      - Content-Length 严格一致
    minimality_reason:
      - 最典型的“封装层错误把二进制当 C 字符串”回归探针
    prerequisites:
      - "curl tests 的 libtests 已构建（工具 lib1531 可用）"
      - "本地 http 测试 server 可用"

  - id: curl_data_test357_expect_100_continue
    source:
      type: curl_data
      path: "curl/tests/data/test357"
      test_number: 357
    capability_gates:
      - http
    dimensions:
      - expect_100_continue
      - retry_without_expect
      - upload_put
    observation_points:
      - 服务端观测两次 PUT：第一次带 Expect，第二次不带 Expect
      - 状态链 417 -> 200 一致
      - 最终请求体字节一致
    minimality_reason:
      - Expect/417/重试是封装层最易产生可观测差异的路径之一
    prerequisites:
      - "本地 http 测试 server 支持 no-expect 行为"
      - "允许约 1MB 上传"

  - id: curl_data_test1011_redirect_post_301_to_get
    source:
      type: curl_data
      path: "curl/tests/data/test1011"
      test_number: 1011
    capability_gates:
      - http
    dimensions:
      - followlocation
      - redirect_chain
      - method_rewrite_post_to_get
    observation_points:
      - 服务端观测请求序列 method 为 POST -> GET
      - 最终落点 URL（经规范化）一致
      - 响应体字节一致
    minimality_reason:
      - 这是最小成本覆盖“重定向时方法语义”的高价值用例

  - id: curl_data_test1024_redirect_with_cookies_path_match
    source:
      type: curl_data
      path: "curl/tests/data/test1024"
      test_number: 1024
    capability_gates:
      - http
      - cookies
    dimensions:
      - followlocation
      - redirect_chain
      - cookie_receive_send
      - cookie_path_match
    observation_points:
      - 重定向链路每跳 URL 一致
      - 仅在 path 匹配时发送 Cookie（服务端观测 Cookie 头）
      - 最终响应体字节一致
    minimality_reason:
      - 用一个用例同时覆盖“重定向 + cookie 基本行为”，且相对稳定
    prerequisites:
      - "启用 cookies（COOKIEFILE/COOKIEJAR 可写）"

  - id: curl_data_test1903_cookiefile_reset_set_again
    source:
      type: curl_data
      path: "curl/tests/data/test1903"
      test_number: 1903
    capability_gates:
      - http
      - cookies
    dimensions:
      - cookiefile
      - cookiejar
      - reset_semantics
    observation_points:
      - 输出 cookiejar 文件（归一化后）记录集合一致
    minimality_reason:
      - 最小覆盖“COOKIEFILE/COOKIEJAR + reset”这一类封装层易出错语义
    prerequisites:
      - "curl tests 的 libtests 已构建（工具 lib1903 可用）"
      - "临时目录可写"

  # ---------------------------------------------------------------------------
  # TLS：证书校验成功/失败（上游 data/testNNNN）
  # ---------------------------------------------------------------------------
  - id: curl_data_test310_https_verify_ok
    source:
      type: curl_data
      path: "curl/tests/data/test310"
      test_number: 310
    capability_gates:
      - ssl
      - local_https
    dimensions:
      - tls_verify_ok
      - ca_bundle
      - https_get
    observation_points:
      - 请求成功（error.kind_normalized=ok）
      - 状态码/响应体字节一致
    minimality_reason:
      - 仅成功路径才能验证 CA/verify 映射正确
    prerequisites:
      - "本地 https server（test-localhost.pem）与 test-ca.crt 可用"

  - id: curl_data_test312_https_verify_fail
    source:
      type: curl_data
      path: "curl/tests/data/test312"
      test_number: 312
    capability_gates:
      - ssl
      - local_https
    dimensions:
      - tls_verify_fail
      - expected_curlcode_60
    observation_points:
      - 失败终态一致（error.kind_normalized=tls_error）
      - 同一构建下 curlcode=60（若可取）一致
    minimality_reason:
      - 封装层最常见回归：TLS 错误被泛化/误映射

  # ---------------------------------------------------------------------------
  # 代理：SOCKS（HTTP/HTTPS-proxy 上游用例不纳入，见 excluded）
  # ---------------------------------------------------------------------------
  - id: curl_data_test703_socks5_connect_fail
    source:
      type: curl_data
      path: "curl/tests/data/test703"
      test_number: 703
    capability_gates:
      - proxy
      - socks5
    dimensions:
      - socks5_proxy
      - error_mapping_proxy_error
    observation_points:
      - 失败终态一致（error.kind_normalized=proxy_error）
      - curlcode（常见 97）在同一构建下应一致
    minimality_reason:
      - SOCKS 代理与 HTTP 代理选项/错误码完全不同，最易出现映射错误

  # ---------------------------------------------------------------------------
  # 本仓库自建：HTTP 错误重试序列（501 → 两次请求）
  # ---------------------------------------------------------------------------
  - id: lc_retry_501_sequence_http_1_1
    source:
      type: pytest
      nodeid: "tests/libcurl_consistency/test_p2_fixed_http_errors.py::test_p2_retry_501_sequence_http_1_1"
    capability_gates:
      - http_observe_server
    dimensions:
      - http_error:501
      - retry_sequence
      - http_version:http_1_1
    observation_points:
      - 服务端观测同一 correlation id 下的两次请求（顺序敏感）
      - requests[]/responses[] 序列语义一致（method/url/headers/status/http_version）
      - error 归一化一致（kind=http/http_status=501）
    minimality_reason:
      - 最小成本覆盖“默认可重试集合包含 501 + 触发重试后产生两次请求”的集成回归点
    prerequisites:
      - "curl/tests/http/testenv 可运行（允许端口绑定）"
      - "qcurl_lc_http_baseline 与 tst_LibcurlConsistency 已构建"
    stability_notes:
      - "不比较重试等待时间，仅比较序列与终态语义"

  # ---------------------------------------------------------------------------
  # 本仓库自建：M4 网络路径控制（RESOLVE / CONNECT_TO）
  # ---------------------------------------------------------------------------
  - id: lc_m4_resolve_override_http_1_1
    source:
      type: pytest
      nodeid: "tests/libcurl_consistency/test_p1_resolve_connect_to.py::test_p1_resolve_override_http_1_1"
    capability_gates:
      - http_observe_server
    dimensions:
      - network_path:resolve
      - dns_override
      - http_version:http_1_1
    observation_points:
      - 不依赖真实 DNS 仍可命中本地服务端
      - 服务端观测 Host/路径/状态一致
    minimality_reason:
      - RESOLVE 是生产常用排障/灰度手段，且最易在封装层丢失/误格式化
    prerequisites:
      - "qcurl_lc_http_baseline 与 tst_LibcurlConsistency 已构建"
      - "http_observe_server.py 可运行（允许端口绑定）"
    stability_notes:
      - "仅覆盖 http/1.1（观测服务端为 h1）；不引入外网 DNS 依赖"

  - id: lc_m4_connect_to_override_http_1_1
    source:
      type: pytest
      nodeid: "tests/libcurl_consistency/test_p1_resolve_connect_to.py::test_p1_connect_to_http_1_1"
    capability_gates:
      - http_observe_server
    dimensions:
      - network_path:connect_to
      - host_semantics_preserved
      - http_version:http_1_1
    observation_points:
      - 路由到指定端口且 Host 语义保持一致（服务端可观测）
      - 不误命中其他服务端实例（pair.a 无观测记录）
    minimality_reason:
      - CONNECT_TO 易导致“连接目标 vs Host 语义”偏差（路由/安全相关）
    prerequisites:
      - "qcurl_lc_http_baseline 与 tst_LibcurlConsistency 已构建"
      - "http_observe_server.py 可运行（允许端口绑定）"
    stability_notes:
      - "仅覆盖 http/1.1（观测服务端为 h1）；不引入外网 DNS 依赖"

  # ---------------------------------------------------------------------------
  # 错误/超时/取消语义（可观测终态）
  # ---------------------------------------------------------------------------
  - id: curl_data_test29_total_timeout
    source:
      type: curl_data
      path: "curl/tests/data/test29"
      test_number: 29
    capability_gates:
      - http
    dimensions:
      - timeout_total
      - error_mapping_timeout
    observation_points:
      - 失败终态一致（error.kind_normalized=timeout）
      - curlcode=28（若可取）一致
    minimality_reason:
      - 超时语义是业务面最常回归的外部可观测行为之一
    stability_notes:
      - "该用例包含 wait 10，CI 需确保时间预算（默认仍较短）"

  - id: curl_data_test19_connect_to_non_listen
    source:
      type: curl_data
      path: "curl/tests/data/test19"
      test_number: 19
    capability_gates:
      - http
    dimensions:
      - connect_fail
      - error_mapping_connect_error
    observation_points:
      - 失败终态一致（error.kind_normalized=connect_error）
      - curlcode=7（若可取）一致
    minimality_reason:
      - 最小成本覆盖“连接失败”与“超时/代理失败”的可观测区分

  - id: curl_data_test1513_abort_by_progress_callback
    source:
      type: curl_data
      path: "curl/tests/data/test1513"
      test_number: 1513
    capability_gates:
      - http
    dimensions:
      - cancel_semantics
      - aborted_by_callback
    observation_points:
      - 失败终态一致（error.kind_normalized=cancel 或 aborted）
      - curlcode=42（若可取）一致
      - 至少一次 progress 可观测事件（若 runner 采集）
    minimality_reason:
      - “用户主动中断”在封装层的错误归一化最易产生偏差

  # ---------------------------------------------------------------------------
  # 本仓库自建：M5 协议白名单（fail-closed）
  # ---------------------------------------------------------------------------
  - id: lc_m5_protocols_block_http_http_1_1
    source:
      type: pytest
      nodeid: "tests/libcurl_consistency/test_p2_protocol_restrictions.py::test_p2_protocols_block_http_http_1_1"
    capability_gates:
      - http_observe_server
    dimensions:
      - security_boundary:allowed_protocols
      - fail_closed
      - error:unsupported_protocol
      - http_version:http_1_1
    observation_points:
      - 不产生真实 HTTP 请求（observe log 为空）
      - 错误归一化一致（curlcode=1/UNSUPPORTED_PROTOCOL）
    minimality_reason:
      - 协议白名单是最重要的 fail-closed 安全边界之一
    prerequisites:
      - "qcurl_lc_http_baseline 与 tst_LibcurlConsistency 已构建"
      - "http_observe_server.py 可运行（允许端口绑定）"
    stability_notes:
      - "禁止 silent skip：能力不足应显式失败以形成证据链"

  - id: lc_m5_redir_protocols_block_http_http_1_1
    source:
      type: pytest
      nodeid: "tests/libcurl_consistency/test_p2_protocol_restrictions.py::test_p2_redir_protocols_block_http_http_1_1"
    capability_gates:
      - http_observe_server
    dimensions:
      - security_boundary:allowed_redirect_protocols
      - redirect_block
      - error:unsupported_protocol
      - http_version:http_1_1
    observation_points:
      - 仅首跳请求可观测（不产生第二跳）
      - 错误归一化一致（curlcode=1/UNSUPPORTED_PROTOCOL）
    minimality_reason:
      - 重定向协议限制是 SSRF/开放跳转防线关键组件
    prerequisites:
      - "qcurl_lc_http_baseline 与 tst_LibcurlConsistency 已构建"
      - "http_observe_server.py 可运行（允许端口绑定）"
    stability_notes:
      - "禁止 silent skip：能力不足应显式失败以形成证据链"

  # ---------------------------------------------------------------------------
  # 本仓库自建：ext 速率限制 smoke（仅 PR gate）
  # ---------------------------------------------------------------------------
  - id: lc_ext_speed_limit_smoke_http_1_1
    source:
      type: pytest
      nodeid: "tests/libcurl_consistency/test_ext_speed_limit_smoke.py::test_ext_speed_limit_smoke_http_1_1"
    capability_gates:
      - http_observe_server
      - ext_suite
    dimensions:
      - speed_limit
      - cancel_semantics
      - http_version:http_1_1
    observation_points:
      - 设置限速后仍可取消（字节阈值触发），终态一致
      - 不做耗时/吞吐强断言（避免 flaky）
    minimality_reason:
      - 限速选项接线错误最容易导致 hang；该 smoke 仅在 PR gate(ext) 覆盖
    prerequisites:
      - "qcurl_lc_http_baseline 与 tst_LibcurlConsistency 已构建"
      - "http_observe_server.py 可运行（允许端口绑定）"
    stability_notes:
      - "仅在 QCURL_LC_EXT=1 下运行（由 run_gate.py --with-ext 注入）"

  # ---------------------------------------------------------------------------
  # 方法语义：HEAD/DELETE（Basic auth 上游用例不纳入，见 excluded）
  # ---------------------------------------------------------------------------
  - id: curl_data_test1484_head_ignore_body
    source:
      type: curl_data
      path: "curl/tests/data/test1484"
      test_number: 1484
    capability_gates:
      - http
    dimensions:
      - http_method:head
      - response_body_must_be_empty
    observation_points:
      - 响应体必须为空（body_len=0/body_sha256 对齐空串）
      - 状态码一致
    minimality_reason:
      - HEAD 被错误当 GET 的回归在封装层非常常见

  - id: curl_data_test13_custom_method_delete
    source:
      type: curl_data
      path: "curl/tests/data/test13"
      test_number: 13
    capability_gates:
      - http
    dimensions:
      - http_method:delete
      - customrequest
    observation_points:
      - 服务端观测 method=DELETE 一致
