# httpbin 镜像锁（证据口径）
#
# 目标：
# - 固定 image tag/digest，避免版本漂移导致“同样命令不同结果”
# - 供 tests/qcurl/httpbin/start_httpbin.sh 与 CI 使用
#
# 说明：
# - 推荐使用 `image@sha256:<digest>` 锁定（而非仅 tag）
# - 如需升级版本：请同时更新本文件、compose.yml，并在变更记录中说明原因

QCURL_HTTPBIN_IMAGE_REF="kennethreitz/httpbin@sha256:599fe5e5073102dbb0ee3dbb65f049dab44fa9fc251f6835c9990f8fb196a72b"
QCURL_HTTPBIN_CONTAINER_NAME="qcurl-httpbin"
