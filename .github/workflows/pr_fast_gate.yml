# PR 快速门禁（Public API + UCE PR tier）
name: PR Gate (fast + UCE PR tier)

on:
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'CMakeLists.txt'
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'docs/**'
      - '.github/workflows/pr_fast_gate.yml'
  push:
    branches: [ master, main, develop ]
    paths:
      - 'CMakeLists.txt'
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'docs/**'
      - '.github/workflows/pr_fast_gate.yml'
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  UCE_RUN_ID: pr-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  pr_fast_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            zlib1g-dev \
            python3 \
            python3-pip \
            apache2 \
            apache2-dev \
            libapache2-mod-http2 \
            libevent-dev

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r tests/libcurl_consistency/requirements.lock.txt

      - name: Ensure curl testenv tool paths (httpd/apxs)
        run: |
          set -euo pipefail
          if [ ! -x /usr/bin/httpd ] && command -v apache2 >/dev/null 2>&1; then
            sudo ln -sf "$(command -v apache2)" /usr/bin/httpd
          fi
          if [ ! -x /usr/bin/apxs ] && command -v apxs2 >/dev/null 2>&1; then
            sudo ln -sf "$(command -v apxs2)" /usr/bin/apxs
          fi

      - name: Configure (CMake)
        run: |
          set -euo pipefail
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON \
            -DQCURL_BUILD_LIBCURL_CONSISTENCY=ON \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_BENCHMARKS=OFF

      - name: Build
        run: |
          set -euo pipefail
          cmake --build build --parallel

      - name: Public API fast gate
        run: |
          set -euo pipefail
          ctest --test-dir build -L '^public-api$' --output-on-failure

      - name: Run UCE PR tier
        run: |
          set -euo pipefail
          python3 scripts/run_uce_gate.py --tier pr --build-dir build --run-id "${{ env.UCE_RUN_ID }}"

      - name: Upload UCE evidence [required]
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uce-pr-evidence-${{ env.UCE_RUN_ID }}
          path: |
            build/evidence/uce/${{ env.UCE_RUN_ID }}/manifest.json
            build/evidence/uce/${{ env.UCE_RUN_ID }}/policy_violations.json
            build/evidence/uce/${{ env.UCE_RUN_ID }}.tar.gz
          retention-days: 14
          if-no-files-found: error
