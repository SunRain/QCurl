# UCE soak：长跑/固定 seed 组
name: UCE Soak

on:
  schedule:
    - cron: '40 18 * * 6'
  workflow_dispatch:

env:
  BUILD_TYPE: RelWithDebInfo
  UCE_RUN_ID: soak-${{ github.run_id }}-${{ github.run_attempt }}
  QCURL_LC_SOAK_DURATION_S: "900"

jobs:
  uce_soak:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            zlib1g-dev \
            python3 \
            python3-pip \
            apache2 \
            apache2-dev \
            libapache2-mod-http2 \
            libevent-dev \
            strace

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r tests/libcurl_consistency/requirements.lock.txt

      - name: Ensure curl testenv tool paths (httpd/apxs)
        run: |
          set -euo pipefail
          if [ ! -x /usr/bin/httpd ] && command -v apache2 >/dev/null 2>&1; then
            sudo ln -sf "$(command -v apache2)" /usr/bin/httpd
          fi
          if [ ! -x /usr/bin/apxs ] && command -v apxs2 >/dev/null 2>&1; then
            sudo ln -sf "$(command -v apxs2)" /usr/bin/apxs
          fi

      - name: Configure soak build
        run: |
          set -euo pipefail
          cmake -S . -B build-soak \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DQCURL_BUILD_LIBCURL_CONSISTENCY=ON

      - name: Build soak targets
        run: |
          set -euo pipefail
          cmake --build build-soak --parallel

      - name: Run UCE soak tier
        run: |
          set -euo pipefail
          python3 scripts/run_uce_gate.py --tier soak --build-dir build-soak --run-id "${{ env.UCE_RUN_ID }}"

      - name: Upload UCE soak evidence [required]
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uce-soak-${{ env.UCE_RUN_ID }}
          path: |
            build-soak/evidence/uce/${{ env.UCE_RUN_ID }}/manifest.json
            build-soak/evidence/uce/${{ env.UCE_RUN_ID }}/policy_violations.json
            build-soak/evidence/uce/${{ env.UCE_RUN_ID }}.tar.gz
          retention-days: 14
          if-no-files-found: error
